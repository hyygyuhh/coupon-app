name: Daily Coupon Reminder

on:
  schedule:
    # 每天北京时间9:00执行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run reminder check
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          REMINDER_DAYS: ${{ secrets.REMINDER_DAYS }}
          REMINDER_TYPE: ${{ secrets.REMINDER_TYPE }}
        run: |
          echo "🚀 启动优惠券提醒检查..."
          echo "📅 当前时间: $(date -u)"
          node scripts/check-reminders.cjs
          echo "✅ 脚本执行完成"

      - name: Handle failure
        if: failure()
        run: |
          echo "❌ 提醒检查失败，请查看上方日志"
