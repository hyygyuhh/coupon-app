name: Daily Coupon Reminder

on:
  schedule:
    # 每天北京时间 09:00 执行（即 UTC 01:00）
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run reminder check
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          REMINDER_DAYS: ${{ secrets.REMINDER_DAYS }}
          REMINDER_TYPE: ${{ secrets.REMINDER_TYPE }}
        run: |
          echo "🚀 启动优惠券提醒检查..."
          echo "📅 当前时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📅 本地时间: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          node scripts/check-reminders.cjs
          echo "✅ 脚本执行完成"
